<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Pro</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="main-header">
        <div class="nav-control">
          <button onclick="changeMonth(-1)" class="nav-btn">
            <i data-lucide="chevron-left"></i>
          </button>
          <div class="title-group">
            <span class="main-label">DESPESAS MENSAIS</span>
            <h1 id="dynamic-title">Maio</h1>
            <span id="year-label">2026</span>
          </div>
          <button onclick="changeMonth(1)" class="nav-btn">
            <i data-lucide="chevron-right"></i>
          </button>
        </div>

        <div class="danger-zone">
          <button onclick="clearMonth()" class="btn-clear-new">
            <i data-lucide="eraser"></i> Limpar este mês
          </button>
        </div>

        <div class="summary-container">
          <div class="summary-item">
            <small>TOTAL MÊS</small>
            <strong id="month-total">R$ 0,00</strong>
          </div>
          <div class="summary-item paid">
            <small>JÁ PAGO</small>
            <strong id="total-paid">R$ 0,00</strong>
          </div>
          <div class="summary-item pending">
            <small>A PAGAR</small>
            <strong id="total-pending">R$ 0,00</strong>
          </div>
        </div>
      </header>

      <section class="form-section" id="form-container">
        <h3 id="form-title">Novo Lançamento</h3>
        <form id="finance-form">
          <input
            type="text"
            id="title"
            placeholder="Descrição (Ex: Condomínio...)"
            required
          />
          <div class="row">
            <input
              type="number"
              id="amount"
              step="0.01"
              placeholder="Valor R$"
              required
            />
            <input type="date" id="date" class="white-calendar" required />
          </div>
          <div class="row">
            <select id="status">
              <option value="pendente">🟡 Pendente</option>
              <option value="pago">✅ Pago (PG)</option>
            </select>
            <label class="recurrence-check">
              <input type="checkbox" id="is-recurring" />
              <span>Conta Fixa (Mensal)</span>
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" id="submit-btn">Adicionar Lançamento</button>
            <button type="button" id="cancel-btn" onclick="resetForm()">
              Cancelar Edição
            </button>
          </div>
        </form>
      </section>

      <div id="lists-wrapper">
        <div class="section-container">
          <h2 class="list-divider">
            <i data-lucide="calendar-days"></i> CONTAS FIXAS (MENSAIS)
          </h2>
          <div id="fixed-container" class="items-list"></div>
        </div>
        <div class="section-container">
          <h2 class="list-divider">
            <i data-lucide="shopping-cart"></i> GASTOS EVENTUAIS
          </h2>
          <div id="eventual-container" class="items-list"></div>
        </div>
      </div>

      <div id="import-area" class="import-section">
        <button onclick="exportData()" class="btn-import">
          💾 Exportar Dados
        </button>

        <input
          type="file"
          id="import-file"
          hidden
          onchange="importData(event)"
        />

        <button
          onclick="document.getElementById('import-file').click()"
          class="btn-import"
        >
          📂 Importar Dados
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
