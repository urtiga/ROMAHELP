<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broker Finance Pro - Controle de Despesas</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="main-header">
        <div class="nav-control">
          <button
            onclick="changeMonth(-1)"
            class="nav-btn"
            title="Mês Anterior"
          >
            <i data-lucide="chevron-left"></i>
          </button>
          <div class="title-group">
            <h1 id="dynamic-title">Despesas de Maio</h1>
            <span id="year-label">2026</span>
          </div>
          <button onclick="changeMonth(1)" class="nav-btn" title="Próximo Mês">
            <i data-lucide="chevron-right"></i>
          </button>
        </div>

        <div class="summary-card">
          <small>PREVISÃO TOTAL DO MÊS</small>
          <strong id="month-total">R$ 0,00</strong>
        </div>
      </header>

      <section class="form-section" id="form-container">
        <h3 id="form-title">Novo Lançamento</h3>
        <form id="finance-form">
          <input
            type="text"
            id="title"
            placeholder="Descrição (Ex: Condomínio, Unimed...)"
            required
          />
          <div class="row">
            <input
              type="number"
              id="amount"
              step="0.01"
              placeholder="Valor R$"
              required
            />
            <input type="date" id="date" required />
          </div>
          <div class="row">
            <select id="status">
              <option value="pendente">🟡 Pendente</option>
              <option value="pago">✅ Pago (PG)</option>
            </select>
            <label class="recurrence-check">
              <input type="checkbox" id="is-recurring" />
              <span>Conta Fixa (Mensal)</span>
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" id="submit-btn">Adicionar Lançamento</button>
            <button type="button" id="cancel-btn" onclick="resetForm()">
              Cancelar Edição
            </button>
          </div>
        </form>
      </section>

      <main id="finance-container" class="items-list"></main>

      <div id="import-area" class="import-section"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
