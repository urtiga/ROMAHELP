<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broker Finance - Pro</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <header class="admin-panel">
      <div class="month-navigation">
        <button onclick="changeMonth(-1)">
          <i data-lucide="chevron-left"></i>
        </button>
        <h1 id="current-month-display">MAIO 2026</h1>
        <button onclick="changeMonth(1)">
          <i data-lucide="chevron-right"></i>
        </button>
      </div>

      <div class="total-banner">
        <span>Previsão de Gastos: </span>
        <strong id="month-total">R$ 0,00</strong>
      </div>

      <form id="finance-form">
        <input
          type="text"
          id="title"
          placeholder="Descrição (Ex: Uniesp Ryan...)"
          required
        />
        <div class="input-row">
          <input
            type="number"
            id="amount"
            step="0.01"
            placeholder="Valor (R$)"
            required
          />
          <input type="date" id="date" required />
        </div>
        <div class="options-row">
          <select id="status">
            <option value="pendente">Pendente</option>
            <option value="pago">Pago (PG)</option>
          </select>
          <label class="checkbox-container">
            <input type="checkbox" id="is-recurring" />
            <span>Conta Mensal Fixa</span>
          </label>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">Salvar no Mês</button>
        </div>
      </form>
    </header>

    <main class="schedule-grid" id="finance-container"></main>

    <script src="script.js"></script>
  </body>
</html>
